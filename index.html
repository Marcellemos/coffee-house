<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemos Coffee House</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- barra de navegação -->
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="./img/logo.png" alt="Logo Lemos Coffee House">
            </div>
             <nav class="nav-links">
                <a class="nav-link" href="#">Nossa História</a>
                <a class="nav-link" href="#">Café Especial</a>
                <a class="nav-link" href="#">Confeitaria</a>
                <a class="nav-link" href="#">Endereços</a>
                <img width="30" height="30" src="https://img.icons8.com/comic/100/e8c9a0/cafe.png" alt="cafe"/>
            </nav>
            <div class="nav-actions">
                <button class="btn-icon" aria-label="Carrinho de compras">
                    <span class="material-symbols-outlined">shopping_bag</span>
                </button>
                <button class="btn-primary">Compre Agora</button>
            </div>            
        </div>
    </header>

    <main>
        <!-- Hero Section com Vídeo de Fundo -->
        <section class="hero">
            <div class="hero-video-container">
                <video class="hero-video" autoplay loop muted playsinline>
                    <source src="./videos/preparo.mp4" type="video/mp4">
                </video>
            </div>
            <div class="hero-overlay"></div>
            <div class="hero-content fade-in">
                <h1 class="hero-title">A arte do<br>Preparo Perfeito</h1>
                <button class="glass-panel">Veja nosso Cardápio</button>
            </div>
            <div class="scroll-down">
                <span class="material-symbols-outlined">expand_more</span>
            </div>
        </section>
    </main>
    
</body>
</html>
